<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Project Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --border-subtle: #1a1a1a;
      --text: #e8e8e8;
      --muted: #666666;
      --dim: #444444;
      --accent: #4f8ef7;
      --badge-planning-bg: #2a1f00; --badge-planning: #f59e0b;
      --badge-progress-bg: #0d1f3c; --badge-progress: #4f8ef7;
      --badge-complete-bg: #0d2a14; --badge-complete: #34d058;
      --owner-claude: #4f8ef7;
      --owner-user: #a78bfa;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      font-size: 13px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 2rem;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    header p {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.2rem;
    }

    #projects {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    /* Header row */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-header h2 {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      flex-shrink: 0;
      font-size: 0.625rem;
      font-weight: 500;
      padding: 0.15em 0.55em;
      border-radius: 99px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge.planning    { background: var(--badge-planning-bg);  color: var(--badge-planning); }
    .badge.in-progress { background: var(--badge-progress-bg);  color: var(--badge-progress); }
    .badge.complete    { background: var(--badge-complete-bg);  color: var(--badge-complete); }
    .badge.unknown     { background: #1a1a1a; color: var(--dim); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border-subtle);
    }

    /* Next steps */
    .next-steps {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .step {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      font-size: 0.6875rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .step-owner {
      flex-shrink: 0;
      font-weight: 600;
      font-size: 0.625rem;
    }

    .step-owner.claude { color: var(--owner-claude); }
    .step-owner.user   { color: var(--owner-user); }
    .step-owner.other  { color: var(--dim); }

    .step-text {
      color: var(--muted);
    }

    .all-done {
      font-size: 0.6875rem;
      color: var(--badge-complete);
    }

    .no-tasks {
      font-size: 0.6875rem;
      color: var(--dim);
    }

    /* Progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
    }

    .progress-fill.done { background: var(--badge-complete); }

    .progress-label {
      font-size: 0.6875rem;
      color: var(--dim);
      white-space: nowrap;
      min-width: 3rem;
      text-align: right;
    }

    /* Footer link */
    .repo-link {
      font-size: 0.625rem;
      color: var(--dim);
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    .repo-link:hover { color: var(--muted); }

    /* Error card */
    .card-error .step-text { color: #5c2222; }

    /* Loading / empty */
    .loading, .empty {
      color: var(--muted);
      font-size: 0.75rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 540px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      #projects { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Project Dashboard</h1>
    <p id="meta">zowen22 · loading…</p>
  </header>
  <main id="projects"><p class="loading">Loading…</p></main>

  <script>
    const GITHUB_USER = 'zowen22';

    const PROJECTS = [
      'X.-Claude-Project-Dashboard',
      '1.-Autonomous-UAVs',
      '6.-Curriculum-Tool',
      '7.-Golf-Shot-Dispersion-Tool',
      '8.-Magic-Band',
      'BetterGolfLeagueTracker',
      // add new projects here
    ];

    function formatName(repo) {
      return repo.replace(/^\d+\.-/, '').replace(/^X\.-/, '').replace(/-/g, ' ');
    }

    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();
      return atob(d.content.replace(/\n/g, ''));
    }

    async function fetchProject(repo) {
      const base = `https://api.github.com/repos/${GITHUB_USER}/${encodeURIComponent(repo)}/contents/1. Project Management/`;
      const [overview, wp] = await Promise.all([
        fetchText(base + encodeURIComponent('2. Project Overview.md')),
        fetchText(base + encodeURIComponent('3. Work Packages.md')),
      ]);
      return { repo, overview, wp };
    }

    function parseStatus(text) {
      const m = text.match(/^## Status\s*\n+`([^`]+)`/m);
      return m ? m[1].trim() : null;
    }

    function parseNextSteps(text, max = 2) {
      const pattern = /^- \[ \] @(\w+) - (.+)$/gm;
      const steps = [];
      let m;
      while ((m = pattern.exec(text)) !== null && steps.length < max) {
        steps.push({ owner: m[1].toLowerCase(), text: m[2].trim() });
      }
      if (steps.length === 0) {
        // fallback: unchecked without @owner format
        const plain = /^- \[ \] (.+)$/gm;
        while ((m = plain.exec(text)) !== null && steps.length < max) {
          steps.push({ owner: null, text: m[1].trim() });
        }
      }
      return steps;
    }

    function parseProgress(text) {
      const total = (text.match(/^- \[[ xX]\]/gm) || []).length;
      const done  = (text.match(/^- \[[xX]\]/gm) || []).length;
      return total === 0 ? null : { done, total, pct: Math.round((done / total) * 100) };
    }

    function statusSlug(s) {
      if (!s) return 'unknown';
      if (s === 'Complete') return 'complete';
      if (s === 'In Progress') return 'in-progress';
      if (s === 'Planning') return 'planning';
      return 'unknown';
    }

    function ownerClass(owner) {
      if (!owner) return 'other';
      if (owner === 'claude') return 'claude';
      if (owner === 'user') return 'user';
      return 'other';
    }

    function renderSteps(steps, allDone) {
      if (allDone) return `<p class="all-done">All tasks complete</p>`;
      if (!steps.length) return `<p class="no-tasks">No tasks found</p>`;
      return steps.map(s => `
        <div class="step">
          ${s.owner ? `<span class="step-owner ${ownerClass(s.owner)}">@${s.owner}</span>` : ''}
          <span class="step-text">${s.text}</span>
        </div>`).join('');
    }

    function renderCard({ repo, overview, wp }) {
      const status   = parseStatus(overview);
      const progress = parseProgress(wp);
      const slug     = statusSlug(status);
      const pct      = progress ? progress.pct : 0;
      const allDone  = progress ? progress.done === progress.total && progress.total > 0 : false;
      const steps    = allDone ? [] : parseNextSteps(wp);
      const label    = progress ? `${progress.done} / ${progress.total}` : '—';

      return `
        <article class="card">
          <div class="card-header">
            <h2>${formatName(repo)}</h2>
            <span class="badge ${slug}">${status || '—'}</span>
          </div>
          <div class="divider"></div>
          <div class="next-steps">${renderSteps(steps, allDone)}</div>
          <div class="divider"></div>
          <div class="progress-row">
            <div class="progress-bar">
              <div class="progress-fill${allDone ? ' done' : ''}" style="width:${pct}%"></div>
            </div>
            <span class="progress-label">${label}</span>
          </div>
          <a class="repo-link" href="https://github.com/${GITHUB_USER}/${repo}" target="_blank" rel="noopener">${repo}</a>
        </article>`;
    }

    function renderError(repo) {
      return `
        <article class="card card-error">
          <div class="card-header">
            <h2>${formatName(repo)}</h2>
            <span class="badge unknown">—</span>
          </div>
          <div class="divider"></div>
          <div class="next-steps"><p class="no-tasks">Could not load project data</p></div>
          <a class="repo-link" href="https://github.com/${GITHUB_USER}/${repo}" target="_blank" rel="noopener">${repo}</a>
        </article>`;
    }

    async function init() {
      const container = document.getElementById('projects');
      const meta      = document.getElementById('meta');

      const results = await Promise.allSettled(PROJECTS.map(fetchProject));

      container.innerHTML = results.map((r, i) =>
        r.status === 'fulfilled' ? renderCard(r.value) : renderError(PROJECTS[i])
      ).join('') || '<p class="empty">No projects registered.</p>';

      const loaded = results.filter(r => r.status === 'fulfilled').length;
      const d = new Date();
      meta.textContent = `zowen22 · ${loaded}/${PROJECTS.length} projects · ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
    }

    init();
  </script>
</body>
</html>
