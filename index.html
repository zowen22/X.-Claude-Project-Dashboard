<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Project Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; }
    body { width: 100%; }

    :root {
      --bg: #0a0a0a;
      --surface: #181818;
      --border: #2d2d2d;
      --border-subtle: #202020;
      --text: #e8e8e8;
      --muted: #9a9a9a;
      --dim: #666666;
      --bar-planning:    #f59e0b;
      --bar-progress:    #4f8ef7;
      --bar-complete:    #34d058;
      --bar-unknown:     #444444;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      font-size: 13px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 2rem;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    header p {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.2rem;
    }

    #projects {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    @media (min-width: 541px) {
      #projects {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.75rem;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      min-width: 0;
    }

    .card h2 {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      min-width: 0;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border-subtle);
    }

    /* Next steps */
    .next-steps {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .step {
      font-size: 0.6875rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .all-done {
      font-size: 0.6875rem;
      color: var(--bar-complete);
    }

    .no-tasks {
      font-size: 0.6875rem;
      color: var(--dim);
    }

    /* Progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--bar-unknown);
    }

    .progress-fill.planning    { background: var(--bar-planning); }
    .progress-fill.in-progress { background: var(--bar-progress); }
    .progress-fill.complete    { background: var(--bar-complete); }

    .progress-label {
      font-size: 0.6875rem;
      color: var(--dim);
      white-space: nowrap;
      min-width: 2.5rem;
      text-align: right;
    }

    /* Footer link */
    .repo-link {
      font-size: 0.625rem;
      color: var(--dim);
      text-decoration: none;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .repo-link:hover { color: var(--muted); }

    /* Loading / empty */
    .loading, .empty {
      color: var(--muted);
      font-size: 0.75rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 540px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      .card { padding: 0.75rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Project Dashboard</h1>
    <p id="meta">zowen22 · loading…</p>
  </header>
  <main id="projects"><p class="loading">Loading…</p></main>

  <script>
    const GITHUB_USER = 'zowen22';

    const PROJECTS = [
      'X.-Claude-Project-Dashboard',
      '1.-Autonomous-UAVs',
      '6.-Curriculum-Tool',
      '7.-Golf-Shot-Dispersion-Tool',
      '8.-Magic-Band',
      'BetterGolfLeagueTracker',
      // add new projects here
    ];

    function formatName(repo) {
      return repo.replace(/^\d+\.-/, '').replace(/^X\.-/, '').replace(/-/g, ' ');
    }

    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      return res.text();
    }

    async function fetchProject(repo) {
      const base = `https://raw.githubusercontent.com/${GITHUB_USER}/${repo}/main/1.%20Project%20Management/`;
      const [overview, wp] = await Promise.all([
        fetchText(base + '2.%20Project%20Overview.md'),
        fetchText(base + '3.%20Work%20Packages.md'),
      ]);
      return { repo, overview, wp };
    }

    function parseStatus(text) {
      const m = text.match(/^## Status\s*\n+`([^`]+)`/m);
      return m ? m[1].trim() : null;
    }

    function parseNextSteps(text, max = 2) {
      const lines = text.match(/^- \[ \] .+$/gm) || [];
      return lines.slice(0, max).map(l => l.replace(/^- \[ \] /, ''));
    }

    function parseProgress(text) {
      const total = (text.match(/^- \[[ xX]\]/gm) || []).length;
      const done  = (text.match(/^- \[[xX]\]/gm) || []).length;
      return total === 0 ? null : { done, total, pct: Math.round((done / total) * 100) };
    }

    function statusSlug(s) {
      if (!s) return 'unknown';
      if (s === 'Complete') return 'complete';
      if (s === 'In Progress') return 'in-progress';
      if (s === 'Planning') return 'planning';
      return 'unknown';
    }

    function renderSteps(steps, allDone) {
      if (allDone) return `<p class="all-done">All tasks complete</p>`;
      if (!steps.length) return `<p class="no-tasks">—</p>`;
      return steps.map(s => `<p class="step">${s}</p>`).join('');
    }

    function renderCard({ repo, overview, wp }) {
      const status   = parseStatus(overview);
      const progress = parseProgress(wp);
      const slug     = statusSlug(status);
      const pct      = progress ? progress.pct : 0;
      const allDone  = progress ? progress.done === progress.total && progress.total > 0 : false;
      const steps    = allDone ? [] : parseNextSteps(wp);
      const label    = progress ? `${progress.done} / ${progress.total}` : '—';

      return `
        <article class="card">
          <h2>${formatName(repo)}</h2>
          <div class="divider"></div>
          <div class="next-steps">${renderSteps(steps, allDone)}</div>
          <div class="divider"></div>
          <div class="progress-row">
            <div class="progress-bar">
              <div class="progress-fill ${slug}" style="width:${pct}%"></div>
            </div>
            <span class="progress-label">${label}</span>
          </div>
          <a class="repo-link" href="https://github.com/${GITHUB_USER}/${repo}" target="_blank" rel="noopener">${repo}</a>
        </article>`;
    }

    function renderError(repo) {
      return `
        <article class="card">
          <h2>${formatName(repo)}</h2>
          <div class="divider"></div>
          <p class="no-tasks">Could not load</p>
          <a class="repo-link" href="https://github.com/${GITHUB_USER}/${repo}" target="_blank" rel="noopener">${repo}</a>
        </article>`;
    }

    async function init() {
      const container = document.getElementById('projects');
      const meta      = document.getElementById('meta');

      const results = await Promise.allSettled(PROJECTS.map(fetchProject));

      container.innerHTML = results.map((r, i) =>
        r.status === 'fulfilled' ? renderCard(r.value) : renderError(PROJECTS[i])
      ).join('') || '<p class="empty">No projects registered.</p>';

      const loaded = results.filter(r => r.status === 'fulfilled').length;
      const d = new Date();
      meta.textContent = `zowen22 · ${loaded}/${PROJECTS.length} · ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
    }

    init();
  </script>
</body>
</html>
